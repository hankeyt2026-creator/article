<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Math Test</title>
</head>
<body>

<!-- ===== Start of Math Test ===== -->

<form>

    <!-- User Name -->
    <label for="username"><strong>Your Name:</strong></label><br>
    <input type="text" id="username" name="username" placeholder="Enter your name"><br><br>


    <!-- Multiple Choice Question 1 -->
    <p><strong>1. What is 5 &times; 3?</strong></p>
    <label><input type="radio" name="q1" value="12"> 12</label><br>
    <label><input type="radio" name="q1" value="15"> 15</label><br>
    <label><input type="radio" name="q1" value="20"> 20</label><br><br>


    <!-- Multiple Choice Question 2 -->
    <p><strong>2. Which number is greater?</strong></p>
    <label><input type="radio" name="q2" value="7"> 7</label><br>
    <label><input type="radio" name="q2" value="9"> 9</label><br>
    <label><input type="radio" name="q2" value="4"> 4</label><br><br>


    <!-- Multiple Choice Question 3 -->
    <p><strong>3. What is 12 &divide; 4?</strong></p>
    <label><input type="radio" name="q3" value="2"> 2</label><br>
    <label><input type="radio" name="q3" value="3"> 3</label><br>
    <label><input type="radio" name="q3" value="4"> 4</label><br><br>


    <!-- Word Problem -->
    <p><strong>4. Word Problem:</strong></p>
    <p>Sarah has 8 apples. She gives 3 to her friend and buys 2 more.  
       How many apples does she have now? Explain your work below.</p>

    <textarea name="wordproblem" rows="5" cols="40" placeholder="Type your answer here..."></textarea><br><br>


    <!-- Submit Button -->
    <button type="submit">Submit Test</button>

</form>

<!-- ===== End of Math Test ===== -->

</body>
</html>
