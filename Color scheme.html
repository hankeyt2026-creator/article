<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phoenix Firebird Color Table</title>
</head>

<body>

    <table border="1">
        <!-- Row 1: Main Heading (merged + styled) -->
        <tr>
            <th colspan="4" 
                style="font-family: Georgia; font-size: 28px; color: #b30000; background-color: #ffe6e6; text-transform: uppercase; letter-spacing: 2px;">
                Colors of the Phoenix Firebird
            </th>
        </tr>

        <!-- Row 2: Column Headings -->
        <tr>
            <th style="background-color: #ff4d4d;">Flame Red</th>
            <th style="background-color: #ff944d;">Ember Orange</th>
            <th style="background-color: #999999;">Smoke Gray</th>
            <th style="background-color: #f2f2f2;">Ash White</th>
        </tr>

        <!-- Row 3: HEX Colors -->
        <tr>
            <td>#ff1a1a</td>
            <td>#ff751a</td>
            <td>#808080</td>
            <td>#ffffff</td>
        </tr>

        <!-- Row 4: RGB Colors -->
        <tr>
            <td>rgb(255, 26, 26)</td>
            <td>rgb(255, 117, 26)</td>
            <td>rgb(128, 128, 128)</td>
            <td>rgb(255, 255, 255)</td>
        </tr>

        <!-- Row 5: HSL Colors -->
        <tr>
            <td>hsl(0, 100%, 55%)</td>
            <td>hsl(24, 100%, 55%)</td>
            <td>hsl(0, 0%, 50%)</td>
            <td>hsl(0, 0%, 100%)</td>
        </tr>
    </table>

</body>
</html>
